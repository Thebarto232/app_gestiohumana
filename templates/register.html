<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Gestión Humana</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 0;
        }
        .register-card {
            border: none;
            border-radius: 15px;
            overflow: hidden;
        }
        .card-header {
            background-color: #fff;
            border-bottom: none;
            padding-top: 2rem;
            text-align: center;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #0d6efd;
        }
        .input-group-text {
            background-color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-lg register-card">
                    <div class="card-header">
                        <div class="mb-3">
                            <i class="fas fa-user-plus fa-4x text-primary"></i>
                        </div>
                        <h4 class="fw-bold text-dark">Crear Cuenta</h4>
                        <p class="text-muted small mb-0">Únete al Portal de Gestión Humana</p>
                    </div>
                    <div class="card-body p-4">
                        <form id="registerForm" action="{{ url_for('auth.register') }}" method="POST">
                            <div class="mb-3">
                                <label for="nombre" class="form-label small fw-bold text-muted">Nombre Completo</label>
                                <div class="input-group">
                                    <span class="input-group-text border-end-0"><i class="fas fa-user text-muted"></i></span>
                                    <input type="text" class="form-control border-start-0 ps-0" id="nombre" name="nombre" placeholder="Tu nombre y apellidos" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="cedula" class="form-label small fw-bold text-muted">Cédula</label>
                                <div class="input-group">
                                    <span class="input-group-text border-end-0"><i class="fas fa-id-card text-muted"></i></span>
                                    <input type="text" class="form-control border-start-0 ps-0" id="cedula" name="cedula" placeholder="Tu número de documento" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="fecha_nacimiento" class="form-label small fw-bold text-muted">Fecha de Nacimiento</label>
                                <div class="input-group">
                                    <span class="input-group-text border-end-0"><i class="fas fa-calendar-alt text-muted"></i></span>
                                    <input type="date" class="form-control border-start-0 ps-0" id="fecha_nacimiento" name="fecha_nacimiento" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label small fw-bold text-muted">Correo Electrónico</label>
                                <div class="input-group">
                                    <span class="input-group-text border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                                    <input type="email" class="form-control border-start-0 ps-0" id="email" name="email" placeholder="ejemplo@correo.com" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label small fw-bold text-muted">Contraseña</label>
                                <div class="input-group">
                                    <span class="input-group-text border-end-0"><i class="fas fa-lock text-muted"></i></span>
                                    <input type="password" class="form-control border-start-0 ps-0" id="password" name="password" placeholder="Crea una contraseña segura" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label for="confirm_password" class="form-label small fw-bold text-muted">Confirmar Contraseña</label>
                                <div class="input-group">
                                    <span class="input-group-text border-end-0"><i class="fas fa-lock text-muted"></i></span>
                                    <input type="password" class="form-control border-start-0 ps-0" id="confirm_password" name="confirm_password" placeholder="Vuelve a escribir la contraseña" required>
                                </div>
                                <div id="passwordHelp" class="form-text text-danger d-none">Las contraseñas no coinciden.</div>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary py-2 fw-bold shadow-sm">Registrarme</button>
                            </div>
                        </form>
                    </div>
                    <div class="card-footer text-center bg-light py-3 border-top-0">
                        <small class="text-muted">¿Ya tienes una cuenta? <a href="{{ url_for('auth.login') }}">Inicia sesión aquí</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap JS Bundle y script de validación -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const password = document.getElementById('password');
        const confirmPassword = document.getElementById('confirm_password');
        const passwordHelp = document.getElementById('passwordHelp');
        document.getElementById('registerForm').addEventListener('submit', function(event) {
            if (password.value !== confirmPassword.value) {
                event.preventDefault();
                confirmPassword.classList.add('is-invalid');
                passwordHelp.classList.remove('d-none');
            } else {
                confirmPassword.classList.remove('is-invalid');
                passwordHelp.classList.add('d-none');
            }
        });
    </script>
</body>
</html>
