<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Nueva Contraseña - Gestión Humana</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #f0f2f5;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .reset-card {
            border: none;
            border-radius: 15px;
            overflow: hidden;
        }
        .card-header {
            background-color: #fff;
            border-bottom: none;
            padding-top: 2rem;
            text-align: center;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #0d6efd;
        }
        .input-group-text {
            background-color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card shadow-lg reset-card">
                    <div class="card-header">
                        <div class="mb-3">
                            <i class="fas fa-shield-alt fa-4x text-primary"></i>
                        </div>
                        <h4 class="fw-bold text-dark">Crea tu Nueva Contraseña</h4>
                        <p class="text-muted small mb-0">Asegúrate de que sea segura.</p>
                    </div>
                    <div class="card-body p-4">
                        <form id="resetForm" action="{{ url_for('auth.reset_with_token', token=token) }}" method="POST">
                            <div class="mb-3">
                                <label for="password" class="form-label small fw-bold text-muted">Nueva Contraseña</label>
                                <div class="input-group">
                                    <span class="input-group-text border-end-0"><i class="fas fa-lock text-muted"></i></span>
                                    <input type="password" class="form-control border-start-0 ps-0" id="password" name="password" placeholder="••••••••" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label for="confirm_password" class="form-label small fw-bold text-muted">Confirmar Nueva Contraseña</label>
                                <div class="input-group">
                                    <span class="input-group-text border-end-0"><i class="fas fa-lock text-muted"></i></span>
                                    <input type="password" class="form-control border-start-0 ps-0" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
                                </div>
                                <div id="passwordHelp" class="form-text text-danger d-none">Las contraseñas no coinciden.</div>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary py-2 fw-bold shadow-sm">Actualizar Contraseña</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap JS Bundle y script de validación -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const password = document.getElementById('password');
        const confirmPassword = document.getElementById('confirm_password');
        const passwordHelp = document.getElementById('passwordHelp');
        document.getElementById('resetForm').addEventListener('submit', function(event) {
            if (password.value !== confirmPassword.value) {
                event.preventDefault();
                confirmPassword.classList.add('is-invalid');
                passwordHelp.classList.remove('d-none');
            } else {
                confirmPassword.classList.remove('is-invalid');
                passwordHelp.classList.add('d-none');
            }
        });
    </script>
</body>
</html>
