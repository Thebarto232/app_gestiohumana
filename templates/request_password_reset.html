<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - Gestión Humana</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #f0f2f5;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .reset-card {
            border: none;
            border-radius: 15px;
            overflow: hidden;
        }
        .card-header {
            background-color: #fff;
            border-bottom: none;
            padding-top: 2rem;
            text-align: center;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #0d6efd;
        }
        .input-group-text {
            background-color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card shadow-lg reset-card">
                    <div class="card-header">
                        <div class="mb-3">
                            <i class="fas fa-key fa-4x text-primary"></i>
                        </div>
                        <h4 class="fw-bold text-dark">Restablecer Contraseña</h4>
                        <p class="text-muted small mb-0">Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.</p>
                    </div>
                    <div class="card-body p-4">
                        <form action="{{ url_for('auth.request_password_reset') }}" method="POST">
                            <div class="mb-3">
                                <label for="email" class="form-label small fw-bold text-muted">Correo Electrónico</label>
                                <div class="input-group">
                                    <span class="input-group-text border-end-0"><i class="fas fa-envelope text-muted"></i></span>
                                    <input type="email" class="form-control border-start-0 ps-0" id="email" name="email" placeholder="ejemplo@correo.com" required autofocus>
                                </div>
                            </div>
                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-primary py-2 fw-bold shadow-sm">Enviar Enlace</button>
                            </div>
                        </form>
                    </div>
                    <div class="card-footer text-center bg-light py-3 border-top-0">
                        <small class="text-muted">¿Recordaste tu contraseña? <a href="{{ url_for('auth.login') }}">Volver a Iniciar Sesión</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
